<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Kakao Map Test</title></head>
<body>
<h3>카카오맵 SDK 테스트</h3>
<div id="map" style="width:100%;height:350px;border:1px solid #ccc;"></div>
<pre id="log" style="background:#f5f5f5;padding:12px;font-size:13px;"></pre>
<script>
function log(msg) {
  console.log(msg);
  document.getElementById('log').textContent += msg + '\n';
}
log('페이지 로드됨');
</script>
<script
  src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c552d630e8da5c5f48dfbeab10af7890&autoload=false&libraries=services"
  onload="onSdkLoad()"
  onerror="log('❌ sdk.js 로드 실패')">
</script>
<script>
function onSdkLoad() {
  log('✅ sdk.js 로드 성공');
  log('readyState: ' + kakao.maps.readyState);
  log('keys: ' + Object.keys(kakao.maps).join(', '));
  log('RESOURCE_PATH: ' + JSON.stringify(kakao.maps.RESOURCE_PATH));

  kakao.maps.load(function() {
    log('✅ kakao.maps.load() 콜백 실행');
    log('readyState after: ' + kakao.maps.readyState);
    log('LatLng: ' + typeof kakao.maps.LatLng);
    log('Map: ' + typeof kakao.maps.Map);
    log('Marker: ' + typeof kakao.maps.Marker);
    log('keys after: ' + Object.keys(kakao.maps).join(', '));

    if (typeof kakao.maps.LatLng === 'function') {
      var center = new kakao.maps.LatLng(37.5076, 126.9786);
      var map = new kakao.maps.Map(document.getElementById('map'), { center: center, level: 3 });
      new kakao.maps.Marker({ position: center, map: map });
      log('✅ 지도 렌더링 성공!');
    } else {
      log('❌ LatLng 없음 - 지도 클래스 로드 실패');
    }
  });
}
</script>
</body>
</html>
